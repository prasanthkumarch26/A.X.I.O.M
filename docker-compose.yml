
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: paper_intel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: paper_user
      POSTGRES_PASSWORD: paper_pass
      POSTGRES_DB: paper_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "paper_user", "-d", "paper_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: paper_intel_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
